  <style>

    .nav-link::after {

<script>
  function syncDivider() {
    var ref = document.querySelector('#divider-line + h2');
    var d = document.getElementById('divider-line');
    if (ref && d) { d.style.width = ref.offsetWidth + 'px'; }
  }
  window.addEventListener('load', syncDivider);
  window.addEventListener('resize', syncDivider);

  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', function() {
    if (window.scrollY > 50) { nav.classList.add('nav-scrolled'); }
    else { nav.classList.remove('nav-scrolled'); }
  });

  document.getElementById('currentYear').textContent = new Date().getFullYear();
</script>
